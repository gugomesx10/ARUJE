name: Docker Publish

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker-publish:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker image names
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "API_IMAGE_NAME=ghcr.io/$OWNER_LC/aruje-api" >> $GITHUB_ENV
          echo "WORKER_IMAGE_NAME=ghcr.io/$OWNER_LC/aruje-worker" >> $GITHUB_ENV

      - name: Build API Docker image
        run: |
          docker build \
            -f Dockerfile \
            -t $API_IMAGE_NAME:${{ github.ref_name }} \
            -t $API_IMAGE_NAME:${{ github.sha }} \
            .

      - name: Build Worker Docker image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t $WORKER_IMAGE_NAME:${{ github.ref_name }} \
            -t $WORKER_IMAGE_NAME:${{ github.sha }} \
            .

      - name: Push API Docker image
        run: |
          docker push $API_IMAGE_NAME:${{ github.ref_name }}
          docker push $API_IMAGE_NAME:${{ github.sha }}

      - name: Push Worker Docker image
        run: |
          docker push $WORKER_IMAGE_NAME:${{ github.ref_name }}
          docker push $WORKER_IMAGE_NAME:${{ github.sha }}

      - name: Push latest tags
        if: github.ref_name == 'main'
        run: |
          docker tag $API_IMAGE_NAME:${{ github.sha }} $API_IMAGE_NAME:latest
          docker push $API_IMAGE_NAME:latest

          docker tag $WORKER_IMAGE_NAME:${{ github.sha }} $WORKER_IMAGE_NAME:latest
          docker push $WORKER_IMAGE_NAME:latest