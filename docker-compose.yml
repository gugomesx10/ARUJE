services:
  aruje-db:
    image: postgres:16
    container_name: aruje-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - aruje_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: aruje-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - aruje_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  aruje-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aruje-api
    restart: unless-stopped
    depends_on:
      aruje-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=aruje-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES}
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_DEFAULT_USER}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS}
      RabbitMq__QueueName: sensor-reading-created
      RabbitMq__ExchangeName: aruje.sensor-readings
      RabbitMq__RoutingKey: sensor-reading.created
      RabbitMq__DeadLetterExchangeName: aruje.sensor-readings.dlx
      RabbitMq__DeadLetterQueueName: sensor-reading-created.dlq
      RabbitMq__DeadLetterRoutingKey: sensor-reading.created.dead
      Seed__DemoData: true
      
  aruje-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: aruje-worker
    restart: unless-stopped
    depends_on:
      aruje-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=aruje-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_DEFAULT_USER}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS}
      RabbitMq__QueueName: sensor-reading-created
      RabbitMq__ExchangeName: aruje.sensor-readings
      RabbitMq__RoutingKey: sensor-reading.created
      RabbitMq__DeadLetterExchangeName: aruje.sensor-readings.dlx
      RabbitMq__DeadLetterQueueName: sensor-reading-created.dlq
      RabbitMq__DeadLetterRoutingKey: sensor-reading.created.dead

  prometheus:
    image: prom/prometheus:latest
    container_name: aruje-prometheus
    restart: unless-stopped
    depends_on:
      - aruje-api
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: aruje-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - aruje_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  aruje_postgres_data:
  aruje_grafana_data:
  aruje_rabbitmq_data: